<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="head" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#dfe6e9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Chimera head (three-faced mythical creature) -->
  <g transform="translate(64,64)" fill="url(#head)">
    <!-- Left face -->
    <ellipse cx="-20" cy="-5" rx="14" ry="18" transform="rotate(-15,-20,-5)" opacity="0.7"/>
    <!-- Center face (main) -->
    <ellipse cx="0" cy="0" rx="16" ry="22"/>
    <!-- Right face -->
    <ellipse cx="20" cy="-5" rx="14" ry="18" transform="rotate(15,20,-5)" opacity="0.7"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-6" r="3" fill="#2d3436"/>
    <circle cx="6" cy="-6" r="3" fill="#2d3436"/>
    <!-- Mouth -->
    <path d="M-5,6 Q0,12 5,6" stroke="#2d3436" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Sparkle / intelligence -->
    <circle cx="0" cy="-14" r="2" fill="#fdcb6e"/>
  </g>
  <!-- Code brackets -->
  <text x="64" y="108" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="bold" opacity="0.8"></></text>
</svg>