# All providers use FREE-tier models. Three keys configured:
#   OpenGateway (OPENGOV_*)  · Google (GOOGLE_*)  · Mistral (MISTRAL_*)
# Role routing picks ONE provider per role (last entry wins per role),
# so the strongest free model is placed last for each role.
#
# Writer  -> OpenGateway tencent/hy3 (free, Novita, built-in reasoning)
# Reviewer -> Google Gemini 2.5 Flash (free quota)
# Challenger -> Mistral open-mistral-7b (free)

providers:
  # Writer — OpenGateway tencent/hy3 (free, reasoning model).
  - name: writer
    provider: openai-compatible
    model: tencent/hy3
    api_key: ${OPENGOV_API_KEY}
    base_url: ${OPENGOV_BASE_URL}
    role: writer
    timeout_ms: 180000

  # Reviewer — Google Gemini 2.5 Flash (free quota).
  - name: reviewer
    provider: google
    model: gemini-2.5-flash
    api_key: ${GOOGLE_API_KEY}
    role: reviewer
    timeout_ms: 120000

  # Challenger — Mistral open-mistral-7b (free).
  - name: challenger
    provider: mistral
    model: open-mistral-7b
    api_key: ${MISTRAL_API_KEY}
    role: challenger
    timeout_ms: 120000

modes:
  code:
    enabled: true
    providers: [writer]
    reviewer: reviewer
    challenger: challenger
    purpose: implement
  ask:
    enabled: true
    providers: [writer]
  plan:
    enabled: true
    providers: [writer]
  debug:
    enabled: true
    providers: [writer]
    reviewer: reviewer
  review:
    enabled: true
    providers: [reviewer]
  oal:
    enabled: true
    providers: [writer]
    reviewer: reviewer
    challenger: challenger
