providers:
  # Writer: Mistral
  - name: writer
    provider: openai-compatible
    model: mistral-small-latest
    api_key: ${MISTRAL_API_KEY}
    base_url: https://api.mistral.ai
    role: writer
    timeout_ms: 60000

  # Reviewer: NVIDIA NIM
  - name: reviewer
    provider: openai-compatible
    model: meta/llama-3.1-8b-instruct
    api_key: ${CHIMERA_CHEAP_API_KEY}
    base_url: https://integrate.api.nvidia.com
    role: reviewer
    timeout_ms: 120000

  # Challenger: Google (Gemini 2.5 Flash - has free quota)
  - name: challenger
    provider: google
    model: gemini-2.5-flash
    api_key: ${GOOGLE_API_KEY}
    role: challenger
