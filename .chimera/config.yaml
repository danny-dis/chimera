providers:
  # Writer: NVIDIA NIM (big free model — llama-3.3-70b, supports response_format)
  - name: writer
    provider: openai-compatible
    model: meta/llama-3.1-70b-instruct
    api_key: ${CHIMERA_CHEAP_API_KEY}
    base_url: https://integrate.api.nvidia.com
    role: writer
    timeout_ms: 180000

  # Reviewer: NVIDIA NIM (fast free model)
  - name: reviewer
    provider: openai-compatible
    model: meta/llama-3.1-8b-instruct
    api_key: ${CHIMERA_CHEAP_API_KEY}
    base_url: https://integrate.api.nvidia.com
    role: reviewer
    timeout_ms: 120000

  # Challenger: Google (Gemini 2.5 Flash - has free quota)
  - name: challenger
    provider: google
    model: gemini-2.5-flash
    api_key: ${GOOGLE_API_KEY}
    role: challenger
