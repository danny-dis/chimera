# All providers use FREE-tier models. Three keys configured:
#   OpenGateway (OPENGOV_*)  · Google (GOOGLE_*)  · Mistral (MISTRAL_*)
# Role routing picks ONE provider per role (last entry wins per role),
# so the strongest free model is placed last for each role.
#
# Writer  -> OpenGateway tencent/hy3 (free, Novita, built-in reasoning)
# Reviewer -> Google Gemini 2.5 Flash (free quota)
# Challenger -> Mistral open-mistral-7b (free)
# DMR-X    -> local meta-model gateway (free key below); activates `backend: dmrx`
#            which rewrites each role's model to its preset: writer->auto-coding,
#            reviewer->auto-fast, challenger->auto-agentic (see dmrx-routing.ts).

backend: dmrx

# With backend: dmrx, applyDmrxRouting (dmrx-routing.ts) rewrites each
# provider's MODEL to its role preset — writer->auto-coding, reviewer->
# auto-fast, challenger->auto-agentic — but does NOT touch base_url. So every
# entry here MUST point at the DMR-X gateway; the meta models are served there.
providers:
  # Writer — DMR-X meta-model gateway (free key).
  - name: writer
    provider: openai-compatible
    model: auto-coding
    api_key: dmr-f5b0eab9462d957d2f15161843931d5069cf87b0dbfdc3dc9dd1acdfebb10839
    base_url: http://127.0.0.1:47113/v1
    role: writer
    timeout_ms: 180000

  # Reviewer — DMR-X meta-model gateway (free key).
  - name: reviewer
    provider: openai-compatible
    model: auto-fast
    api_key: dmr-f5b0eab9462d957d2f15161843931d5069cf87b0dbfdc3dc9dd1acdfebb10839
    base_url: http://127.0.0.1:47113/v1
    role: reviewer
    timeout_ms: 120000

  # Challenger — DMR-X meta-model gateway (free key).
  - name: challenger
    provider: openai-compatible
    model: auto-agentic
    api_key: dmr-f5b0eab9462d957d2f15161843931d5069cf87b0dbfdc3dc9dd1acdfebb10839
    base_url: http://127.0.0.1:47113/v1
    role: challenger
    timeout_ms: 120000

modes:
  code:
    enabled: true
    providers: [writer]
    reviewer: reviewer
    challenger: challenger
    purpose: implement
  ask:
    enabled: true
    providers: [writer]
  plan:
    enabled: true
    providers: [writer]
  debug:
    enabled: true
    providers: [writer]
    reviewer: reviewer
  review:
    enabled: true
    providers: [reviewer]
  oal:
    enabled: true
    providers: [writer]
    reviewer: reviewer
    challenger: challenger
