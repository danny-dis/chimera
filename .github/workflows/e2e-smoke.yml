name: E2E Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [ask, plan, code, debug, review, oal]
        preset: [solo, duo, trio, fusion]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Smoke test ${{ matrix.mode }}/${{ matrix.preset }}
        run: node scripts/smoke-test.js --mode ${{ matrix.mode }} --preset ${{ matrix.preset }}
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CHIMERA_CHEAP_API_KEY: ${{ secrets.CHIMERA_CHEAP_API_KEY }}
          CHIMERA_CHEAP_BASE_URL: ${{ secrets.CHIMERA_CHEAP_BASE_URL }}
          CHIMERA_CHEAP_MODEL: ${{ secrets.CHIMERA_CHEAP_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # Summary job — fails if any matrix job failed
  smoke-summary:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.smoke-test.result }}" != "success" ]; then
            echo "Some smoke tests failed"
            exit 1
          fi
          echo "All smoke tests passed"
